<script>
	 function toggle(header) {
  const content = header.nextElementSibling;

  if (content.style.maxHeight && content.style.maxHeight !== "0px") {
    // Currently open → close it
    content.style.maxHeight = "0px";
    header.textContent = header.textContent.replace("[hide]", "[show]");
  } else {
    // Currently closed → open it
    content.style.maxHeight = content.scrollHeight + "px"; // dynamic height
    header.textContent = header.textContent.replace("[show]", "[hide]");
  }
} 
</script> 

<h1>English → Custom Alphabet</h1>

<textarea id="input" placeholder="Enter English text"></textarea>
<br>
<button onclick="translateText()">Translate</button>

<div id="output"></div>

<script>

const alphabet = {
    A: "EH",
    B: "BE",
    C: "SI",
    D: "DI",
    E: "I",
    F: "FH",
    G: "JE",
    H: "CH",
    I: "HI",
    J: "GA",
    K: "KH",
    L: "EL",
    M: "MN",
    N: "NH",
    O: "OU",
    P: "PE",
    Q: "KU",
    R: "AR",
    S: "TS",
    T: "TI",
    U: "OI",
    V: "E",
    W: "VU",
    X: "LC",
    Y: "IE",
    Z: "ZA"
};

function translateText() {

    const text = document.getElementById("input").value.toUpperCase();

    let result = "";
    let i = 0;

    while (i < text.length) {

        const current = text[i];

        if (current === " ") {
            result += " ";
            i++;
            continue;
        }

        let count = 1;

        while (i + count < text.length && text[i + count] === current) {
            count++;
        }

        if (alphabet[current]) {

            result += alphabet[current];

            let extras = count - 1;

            while (extras >= 2) {
                result += '"';
                extras -= 2;
            }

            while (extras >= 1) {
                result += "'";
                extras -= 1;
            }

        } else {
            result += current;
        }

        i += count;
    }

    document.getElementById("output").textContent = result;
}

</script>
