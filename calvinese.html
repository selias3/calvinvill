<script>
	 function toggle(header) {
  const content = header.nextElementSibling;

  if (content.style.maxHeight && content.style.maxHeight !== "0px") {
    // Currently open → close it
    content.style.maxHeight = "0px";
    header.textContent = header.textContent.replace("[hide]", "[show]");
  } else {
    // Currently closed → open it
    content.style.maxHeight = content.scrollHeight + "px"; // dynamic height
    header.textContent = header.textContent.replace("[show]", "[hide]");
  }
} 

</script> 

<h1>Custom Alphabet Translator</h1>

<textarea id="input"></textarea>
<br>
<button onclick="translateText()">Translate</button>

<div id="output"></div>

<script>

const alphabet = {
    A: "EH", B: "BE", C: "SI", D: "DI", E: "I",
    F: "FH", G: "JE", H: "CH", I: "HI", J: "GA",
    K: "KH", L: "EL", M: "MN", N: "NH", O: "OU",
    P: "PE", Q: "KU", R: "AR", S: "TS", T: "TI",
    U: "OI", V: "E", W: "VU", X: "LC", Y: "IE", Z: "ZA"
};

function translateText() {

    const text = document.getElementById("input").value;

    // STEP 1: convert to chunks (case-sensitive)
    let chunks = [];

    for (let c of text) {
        if (alphabet[c.toUpperCase()]) {
            chunks.push({
                char: c,
                chunk: alphabet[c.toUpperCase()]
            });
        }
    }

    // STEP 2: group + apply rules
    let output = "";
    let i = 0;

    while (i < chunks.length) {

        let current = chunks[i];

        let count = 1;

        while (
            i + count < chunks.length &&
            chunks[i + count].chunk === current.chunk
        ) {
            count++;
        }

        output += current.chunk;

        let extras = count - 1;

        // chunk repeats → "
        if (extras === 1) output += "'";
        else if (extras === 2) output += '"';
        else if (extras > 2) {
            output += '"'.repeat(Math.floor(extras / 2));
            if (extras % 2 === 1) output += "'";
        }

        i += count;
    }

    document.getElementById("output").textContent = output;
}

</script>
