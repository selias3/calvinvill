<script>
	 function toggle(header) {
  const content = header.nextElementSibling;

  if (content.style.maxHeight && content.style.maxHeight !== "0px") {
    // Currently open → close it
    content.style.maxHeight = "0px";
    header.textContent = header.textContent.replace("[hide]", "[show]");
  } else {
    // Currently closed → open it
    content.style.maxHeight = content.scrollHeight + "px"; // dynamic height
    header.textContent = header.textContent.replace("[show]", "[hide]");
  }
} 

</script> 

<h1>Custom Alphabet Translator</h1>

<textarea id="input"></textarea>
<br>
<button onclick="translate()">Translate</button>

<div id="output"></div>

<script>

const alphabet = {
    A:"EH",B:"BE",C:"SI",D:"DI",E:"I",
    F:"FH",G:"JE",H:"CH",I:"HI",J:"GA",
    K:"KH",L:"EL",M:"MN",N:"NH",O:"OU",
    P:"PE",Q:"KU",R:"AR",S:"TS",T:"TI",
    U:"OI",V:"E",W:"VU",X:"LC",Y:"IE",Z:"ZA"
};

function translate() {

    const input = document.getElementById("input").value;

    // STEP 1: build tokens
    let tokens = [];

    for (let ch of input) {
        if (ch === " ") {
            tokens.push({ type: "space" });
        } else {
            let up = ch.toUpperCase();
            if (alphabet[up]) {
                tokens.push({
                    type: "char",
                    char: ch,
                    chunk: alphabet[up]
                });
            }
        }
    }

    // STEP 2: process groups
    let out = "";
    let i = 0;

    while (i < tokens.length) {

        let t = tokens[i];

        if (t.type === "space") {
            out += "_";
            i++;
            continue;
        }

        let letterCount = 1;
        let chunkCount = 1;

        // count letter repeats
        while (
            i + letterCount < tokens.length &&
            tokens[i + letterCount].type === "char" &&
            tokens[i + letterCount].char === t.char
        ) {
            letterCount++;
        }

        // count chunk repeats
        while (
            i + chunkCount < tokens.length &&
            tokens[i + chunkCount].type === "char" &&
            tokens[i + chunkCount].chunk === t.chunk
        ) {
            chunkCount++;
        }

        // =========================
        // RULE 1: letter repeat → '
        // =========================
        if (letterCount > 1) {
            out += t.chunk + "'";
            i += letterCount;
            continue;
        }

        // emit chunk
        out += t.chunk;

        // =========================
        // RULE 2: chunk repeat → "
        // =========================
        let extras = chunkCount - 1;

        if (extras === 1) out += "'";
        else if (extras === 2) out += '"';
        else if (extras > 2) {
            out += '"'.repeat(Math.floor(extras / 2));
            if (extras % 2 === 1) out += "'";
        }

        i += chunkCount;
    }

    document.getElementById("output").textContent = out;
}

</script>
