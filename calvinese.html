<script>
	 function toggle(header) {
  const content = header.nextElementSibling;

  if (content.style.maxHeight && content.style.maxHeight !== "0px") {
    // Currently open → close it
    content.style.maxHeight = "0px";
    header.textContent = header.textContent.replace("[hide]", "[show]");
  } else {
    // Currently closed → open it
    content.style.maxHeight = content.scrollHeight + "px"; // dynamic height
    header.textContent = header.textContent.replace("[show]", "[hide]");
  }
} 

</script>

<h1>Calvinese Translator</h1>

<textarea id="input"></textarea>
<br>
<button onclick="translateText()">Translate</button>

<div id="output"></div>

<script>

const alphabet = {
    A: "EH", B: "BE", C: "SI", D: "DI", E: "I",
    F: "FH", G: "JE", H: "CH", I: "HI", J: "GA",
    K: "KH", L: "EL", M: "MN", N: "NH", O: "OU",
    P: "PE", Q: "KU", R: "AR", S: "TS", T: "TI",
    U: "OI", V: "E", W: "VU", X: "LC", Y: "IE", Z: "ZA"
};

function translateText() {
    const text = document.getElementById("input").value;

    let output = "";
    let i = 0;

    while (i < text.length) {

        // =========================
        // SPACE HANDLING (NEW)
        // =========================
        if (text[i] === " ") {
            output += " ";
            i++;
            continue;
        }

        let c = text[i];
        let key = c.toUpperCase();

        if (!alphabet[key]) {
            i++;
            continue;
        }

        // 1. Count identical consecutive letters
        let count = 1;
        while (
            i + count < text.length &&
            text[i + count] === c
        ) {
            count++;
        }

        let chunk = alphabet[key];

        // preserve case
        if (c === c.toLowerCase()) {
            chunk = chunk.toLowerCase();
        }

        output += chunk;

        // repetition markers
        if (count === 2) output += "'";
        else if (count === 3) output += '"';
        else if (count > 3) {
            output += '"'.repeat(Math.floor(count / 2));
            if (count % 2 === 1) output += "'";
        }

        i += count;
    }

    document.getElementById("output").textContent = output;
}
</script>
